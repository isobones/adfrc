# Watches GitHub Actions versions in .github/workflows/.
# Opens PRs when newer versions are available.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Bundle all action updates into one PR per week instead of one PR per action.
    # Drop this `groups` block if you'd rather have separate PRs per action.
    groups:
      github-actions:
        patterns:
          - "*"
    # Cap open PRs so we don't drown in update noise if I forget to merge them.
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "meta"
